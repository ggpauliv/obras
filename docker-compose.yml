version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pawliv-postgres
    environment:
      POSTGRES_DB: pawliv_obras
      POSTGRES_USER: pawliv_user
      POSTGRES_PASSWORD: 123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawliv_user -d pawliv_obras"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pawliv-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pawliv-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pawliv.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pawliv-network

volumes:
  postgres_data:
    driver: local

networks:
  pawliv-network:
    driver: bridge
